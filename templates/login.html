{% extends "base.html" %}
{% block title %}Login — ScamShield AI{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to run AI fraud checks and view your dashboard.</p>
    <form method="POST" action="{{ url_for('login') }}" class="form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="••••••••">

      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    <p class="auth-hint">Admin demo login: <code>admin@scamshield.ai</code> / <code>Admin@123</code></p>
  </div>
</section>
{% endblock %}
